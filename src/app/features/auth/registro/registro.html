<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <p class="auth-badge">Únete ahora</p>
      <h2>Crear Cuenta</h2>
      <p class="auth-subtitle">Regístrate para comenzar a gestionar películas y comentarios.</p>
    </div>

    <form class="auth-form" (ngSubmit)="registrar()">
      <div class="grupo">
        <label for="nombre">Nombre completo</label>
        <div class="input-wrap">
          <span class="icono">📝</span>
          <input id="nombre" name="nombre" type="text" [(ngModel)]="usuario.nombreCompleto" placeholder="Ingrese su nombre completo" required />
        </div>
      </div>

      <div class="grupo">
        <label for="usuario">Usuario</label>
        <div class="input-wrap">
          <span class="icono">👤</span>
          <input id="usuario" name="usuario" type="text" [(ngModel)]="usuario.usuarioLogin" placeholder="Ingrese su usuario" required />
        </div>
      </div>

      <div class="grupo">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span class="icono">🔒</span>
          <input id="password" name="password" type="password" [(ngModel)]="usuario.password" placeholder="Ingrese su contraseña" required />
        </div>
      </div>

      <button type="submit">Registrarse</button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</section>
